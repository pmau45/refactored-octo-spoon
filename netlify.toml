[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NEXT_TELEMETRY_DISABLED = "1"
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Force HTTPS — redirect http to https (non-www)
[[redirects]]
  from = "http://axiomcanine.dev/*"
  to = "https://axiomcanine.dev/:splat"
  status = 301
  force = true

# Force HTTPS — redirect http www to https non-www
[[redirects]]
  from = "http://www.axiomcanine.dev/*"
  to = "https://axiomcanine.dev/:splat"
  status = 301
  force = true

# Redirect www to non-www (https)
[[redirects]]
  from = "https://www.axiomcanine.dev/*"
  to = "https://axiomcanine.dev/:splat"
  status = 301
  force = true

# Legacy route redirects (301 — preserve SEO equity)
[[redirects]]
  from = "/behavior"
  to = "/services/behavior-modification"
  status = 301

[[redirects]]
  from = "/behavior/*"
  to = "/services/behavior-modification"
  status = 301

[[redirects]]
  from = "/obedience"
  to = "/services/advanced-obedience"
  status = 301

[[redirects]]
  from = "/obedience/*"
  to = "/services/advanced-obedience"
  status = 301

# Cache static assets
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
