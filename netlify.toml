[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NEXT_TELEMETRY_DISABLED = "1"
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Legacy route redirects (301 — preserve SEO equity)
[[redirects]]
  from = "/behavior"
  to = "/services/behavior-modification"
  status = 301

[[redirects]]
  from = "/behavior/*"
  to = "/services/behavior-modification"
  status = 301

[[redirects]]
  from = "/obedience"
  to = "/services/advanced-obedience"
  status = 301

[[redirects]]
  from = "/obedience/*"
  to = "/services/advanced-obedience"
  status = 301

# Sitemap — ensure correct MIME type and reasonable caching for crawlers
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    Cache-Control = "public, max-age=3600, must-revalidate"

# Cache static assets
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
